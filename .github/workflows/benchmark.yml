name: Benchmark Voltcc

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "05 10,22 * * *"

permissions:
  contents: write

concurrency:
  group: benchmark-results
  cancel-in-progress: false

jobs:
  benchmark:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
          - os: ubuntu-24.04
            target: linux-i386
          - os: ubuntu-24.04-arm
            target: linux-aarch64
          - os: windows-2022
            target: windows-x86_64
          - os: windows-2022
            target: windows-i386
          - os: macos-14
            target: macos-aarch64

    steps:
      - name: Check out benchmark repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare release binary
        shell: bash
        run: |
          chmod +x preparebin.sh
          ./preparebin.sh --target "${{ matrix.target }}"

      - name: Run benchmark suites
        shell: bash
        run: |
          python run_benchmarks.py --target "${{ matrix.target }}"

      - name: Upload benchmark summary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: bench_results/incoming/${{ matrix.target }}/summary.json
          if-no-files-found: error

  publish:
    name: Publish benchmark results
    runs-on: ubuntu-latest
    needs: benchmark

    steps:
      - name: Check out benchmark repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download benchmark summaries
        uses: actions/download-artifact@v4
        with:
          path: bench_results/incoming

      - name: Update README and result snapshots
        shell: bash
        run: |
          python update_readme.py

      - name: Commit and push benchmark results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md bench_results/latest bench_results/history
          if git diff --cached --quiet; then
            echo "No benchmark result changes to commit."
            exit 0
          fi
          git commit -m "Update benchmark results"
          git push
