name: Benchmark Voltcc

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "05 10,22 * * *"

permissions:
  contents: write

concurrency:
  group: benchmark-results
  cancel-in-progress: false

jobs:
  benchmark:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
          - os: ubuntu-24.04
            target: linux-i386
          - os: ubuntu-24.04-arm
            target: linux-aarch64
          - os: windows-2022
            target: windows-x86_64
          - os: windows-2022
            target: windows-i386
          - os: macos-14
            target: macos-aarch64

    steps:
      - name: Check out benchmark repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hyperfine (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install hyperfine

      - name: Install hyperfine (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install hyperfine --no-progress -y

      - name: Provide GNU-compatible time shim
        if: runner.os != 'Linux'
        shell: bash
        run: |
          mkdir -p .ci-bin
          printf '%s\n' '#!/usr/bin/env bash' 'exec python scripts/time_shim.py "$@"' > .ci-bin/time
          chmod +x .ci-bin/time

      - name: Prepare release binary
        shell: bash
        run: |
          chmod +x preparebin.sh run_benchmarks.sh test_semantic/_runner_common.sh test_semantic/benchmark_syntaxcheck.sh test_semantic/benchmark_realworld_phases.sh test_semantic/benchmark_realworld_resources.sh
          ./preparebin.sh --target "${{ matrix.target }}"

      - name: Run benchmark suites
        shell: bash
        run: |
          PATH="$PWD/.ci-bin:$PATH" bash ./run_benchmarks.sh --target "${{ matrix.target }}"

      - name: Upload benchmark summary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: bench_results/incoming/${{ matrix.target }}
          if-no-files-found: error

  publish:
    name: Publish benchmark results
    runs-on: ubuntu-latest
    needs: benchmark
    if: ${{ always() }}

    steps:
      - name: Check out benchmark repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download benchmark summaries
        uses: actions/download-artifact@v4
        with:
          path: bench_results/incoming

      - name: Update README and result snapshots
        shell: bash
        run: |
          python update_readme.py

      - name: Commit and push benchmark results
        shell: bash
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add README.md bench_results/latest bench_results/history
          if git diff --cached --quiet; then
            echo "No benchmark result changes to commit."
            exit 0
          fi
          git commit -m "Update benchmark results"
          git push
